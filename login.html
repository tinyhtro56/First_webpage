<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <style>
        body {
            background-color: rgb(107, 4, 240);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background-color: rgb(15, 102, 117);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }
        input {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            background-color: white;
            color: rgb(117, 15, 117);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>Login</h1>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="error" style="color: red;"></p>
</div>

<script>
    function login() {
        // Hardcoded username and password (demo only)
        const correctUsername = "User";
        const correctPassword = "";

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        if(username === correctUsername && password === correctPassword) {
            // Redirect to your webpage
            window.location.href = "index.html"; // change this to your actual file name
        } else {
            document.getElementById("error").innerText = "Invalid, try again!";
        }
    }
</script>



</body>
</html>
